<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>500 — Server Error · InvoiceForge</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#0F172A;color:#E2E8F0;
     display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px}
.card{background:#1E293B;border:1px solid #334155;border-radius:16px;
      padding:48px 40px;max-width:440px;width:100%;text-align:center}
.code{font-size:72px;font-weight:800;color:#1E293B;letter-spacing:-.04em;line-height:1;
      -webkit-text-stroke:2px #EF4444}
.icon{font-size:36px;margin:8px 0 20px}
h1{font-size:20px;font-weight:700;color:#F1F5F9;margin-bottom:10px}
p{font-size:14px;color:#64748B;line-height:1.6;margin-bottom:28px}
.btn{display:inline-flex;align-items:center;gap:8px;background:linear-gradient(135deg,#3B82F6,#2563EB);
     color:#fff;padding:11px 24px;border-radius:8px;font-size:14px;font-weight:600;
     text-decoration:none;transition:transform .15s,box-shadow .15s}
.btn:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(59,130,246,.35)}
.divider{height:1px;background:#334155;margin:28px 0}
.hint{font-size:12px;color:#475569;line-height:1.5}
.hint code{background:#0F172A;border:1px solid #334155;border-radius:4px;
           padding:1px 6px;font-size:11px;color:#94A3B8}
</style>
</head>
<body>
<div class="card">
  <div class="code">500</div>
  <div class="icon">⚙️</div>
  <h1>Something Went Wrong</h1>
  <p>The server encountered an unexpected error.<br/>
     This has been logged. Please try again in a moment.</p>
  <a class="btn" href="/">
    <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
      <polyline points="1 4 1 10 7 10"/>
      <path d="M3.51 15a9 9 0 102.13-9.36L1 10"/>
    </svg>
    Retry
  </a>
  <div class="divider"></div>
  <p class="hint">
    If this keeps happening, check the server logs with<br/>
    <code>python app.py</code> or <code>docker logs invoiceforge</code>
  </p>
</div>
</body>
</html>
