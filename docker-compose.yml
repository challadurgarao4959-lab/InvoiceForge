version: "3.9"

services:
  invoiceforge:
    build: .
    container_name: invoiceforge
    restart: unless-stopped
    ports:
      - "${PORT:-8000}:8000"
    volumes:
      # Persist the SQLite database between container restarts
      - ./data:/app/data
    environment:
      - FLASK_ENV=${FLASK_ENV:-production}
      - SECRET_KEY=${SECRET_KEY:-change-me-before-deploy}
      - MAX_ITEMS=${MAX_ITEMS:-100}
      - MAX_INVOICES=${MAX_INVOICES:-10000}
    healthcheck:
      test: ["CMD", "python3", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
