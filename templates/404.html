<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>404 — Page Not Found · InvoiceForge</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#0F172A;color:#E2E8F0;
     display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px}
.card{background:#1E293B;border:1px solid #334155;border-radius:16px;
      padding:48px 40px;max-width:440px;width:100%;text-align:center}
.code{font-size:72px;font-weight:800;color:#1E3A5F;letter-spacing:-.04em;line-height:1;
      font-family:system-ui,sans-serif}
.icon{font-size:36px;margin:8px 0 20px}
h1{font-size:20px;font-weight:700;color:#F1F5F9;margin-bottom:10px}
p{font-size:14px;color:#64748B;line-height:1.6;margin-bottom:28px}
.btn{display:inline-flex;align-items:center;gap:8px;background:linear-gradient(135deg,#3B82F6,#2563EB);
     color:#fff;padding:11px 24px;border-radius:8px;font-size:14px;font-weight:600;
     text-decoration:none;transition:transform .15s,box-shadow .15s}
.btn:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(59,130,246,.35)}
.divider{height:1px;background:#334155;margin:28px 0}
.links{display:flex;gap:16px;justify-content:center}
.links a{font-size:13px;color:#3B82F6;text-decoration:none}
.links a:hover{text-decoration:underline}
</style>
</head>
<body>
<div class="card">
  <div class="code">404</div>
  <div class="icon">🗂️</div>
  <h1>Page Not Found</h1>
  <p>The page you're looking for doesn't exist or has been moved.<br/>
     Double-check the URL or head back to the dashboard.</p>
  <a class="btn" href="/">
    <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
      <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/>
    </svg>
    Go to Dashboard
  </a>
  <div class="divider"></div>
  <div class="links">
    <a href="/">Dashboard</a>
    <a href="/" onclick="history.back();return false;">Go Back</a>
  </div>
</div>
</body>
</html>
